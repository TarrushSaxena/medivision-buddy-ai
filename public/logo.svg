<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="48" height="48" rx="10" fill="url(#logoGradient)"/>
  <!-- Eye outline -->
  <ellipse cx="24" cy="24" rx="14" ry="10" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Pupil with medical cross -->
  <circle cx="24" cy="24" r="6" fill="white"/>
  <!-- Medical cross inside pupil -->
  <path d="M24 20v8M20 24h8" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
  <!-- Heartbeat line through the eye -->
  <path d="M8 24h6l2-4 3 8 2-4h19" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
